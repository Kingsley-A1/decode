name: Decode CI

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: decode-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, Prisma validate, build
    runs-on: ubuntu-latest
    env:
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ci-auth-secret-minimum-32-characters
      NEXTAUTH_SECRET: ci-auth-secret-minimum-32-characters
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      GITHUB_ID: ci-github-client-id
      GITHUB_SECRET: ci-github-client-secret
      DATABASE_URL: postgresql://decode:decode@localhost:26257/decode?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Build
        run: npm run build
