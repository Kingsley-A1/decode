name: Decode CI

on:
  pull_request:
  push:
    branches: ["main"]
  deployment_status:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: decode-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, Prisma validate, build
    if: github.event_name != 'deployment_status'
    runs-on: ubuntu-latest
    env:
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      AUTH_SECRET: ci-auth-secret-minimum-32-characters
      NEXTAUTH_SECRET: ci-auth-secret-minimum-32-characters
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      GITHUB_ID: ci-github-client-id
      GITHUB_SECRET: ci-github-client-secret
      DATABASE_URL: postgresql://decode:decode@localhost:26257/decode?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke checks
        run: npm run smoke:e2e
        env:
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start -- --hostname 127.0.0.1 --port 3100

      - name: Lighthouse CI
        run: npm run lhci

  preview-smoke:
    name: Preview deployment smoke checks
    if: >-
      github.event_name == 'deployment_status' &&
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
      SMOKE_DYNAMIC_SLUG: ${{ secrets.SMOKE_DYNAMIC_SLUG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run preview smoke checks
        run: npm run smoke:e2e
